<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รับรูปภาพ เตะบอล</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4285F4;
            --bg-color: #f1f3f9;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg-color);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container-card {
            background: white;
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        .icon-box {
            font-size: 64px;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            color: #202124;
            margin-bottom: 40px; /* เพิ่มระยะห่างระหว่างหัวข้อกับปุ่ม */
        }

        .btn-drive {
            width: 100%;
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(66, 133, 244, 0.2);
        }

        .btn-drive:hover {
            background: #3367d6;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(66, 133, 244, 0.3);
        }

        .btn-drive:active {
            transform: translateY(0);
        }

        .btn-drive img {
            width: 28px;
        }
    </style>
</head>
<body>

<div class="container-card">
    <div class="icon-box">⚽</div>
    <h1>รับรูปภาพ เตะบอล</h1>

    <button class="btn-drive" onclick="openDrive()">
        <img src="https://upload.wikimedia.org/wikipedia/commons/1/12/Google_Drive_icon_%282020%29.svg" alt="Drive Icon">
        รับรูปภาพ
    </button>
</div>

<script>
    function openDrive() {
        const driveUrl = "https://drive.google.com/drive/folders/11KHgKWNl0-smAmqa1S8okQjyhY0uIvcB?usp=sharing";
        window.open(driveUrl, '_blank');
    }
</script>

</body>
</html>
